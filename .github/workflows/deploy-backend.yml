name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "requirements.txt"
      - "Dockerfile"
      - ".dockerignore"
      - "deploy/ec2/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

env:
  IMAGE_NAME: facemaxx

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Docker Hub image
        id: dockerhub
        shell: bash
        run: |
          USERNAME="$(printf '%s' '${{ secrets.DOCKERHUB_USERNAME }}' | tr -d '[:space:]')"
          if [ -z "$USERNAME" ]; then
            echo "DOCKERHUB_USERNAME secret is empty" >&2
            exit 1
          fi
          echo "::add-mask::$USERNAME"
          echo "username=$USERNAME" >> "$GITHUB_OUTPUT"
          echo "image=$USERNAME/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ steps.dockerhub.outputs.username }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.dockerhub.outputs.image }}:latest
            ${{ steps.dockerhub.outputs.image }}:${{ github.sha }}

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload compose file
        run: |
          ssh -i ~/.ssh/ec2_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "sudo mkdir -p /opt/facemaxx && sudo chown ${{ secrets.EC2_USER }}:${{ secrets.EC2_USER }} /opt/facemaxx"
          scp -i ~/.ssh/ec2_key deploy/ec2/docker-compose.yml "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/facemaxx/docker-compose.yml"

      - name: Log in to Docker Hub on EC2
        run: |
          ssh -i ~/.ssh/ec2_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "printf '%s' '${{ secrets.DOCKERHUB_TOKEN }}' | docker login -u '${{ steps.dockerhub.outputs.username }}' --password-stdin"

      - name: Pull and restart container
        run: |
          IMAGE="${{ steps.dockerhub.outputs.image }}:${{ github.sha }}"
          ssh -i ~/.ssh/ec2_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "IMAGE='$IMAGE' bash -se" <<'REMOTE'
            cd /opt/facemaxx
            tmp="$(mktemp)"
            if [ -f .env ]; then
              grep -v '^FACEMAXX_IMAGE=' .env > "$tmp"
            fi
            printf '\nFACEMAXX_IMAGE=%s\n' "$IMAGE" >> "$tmp"
            mv "$tmp" .env
            chmod 600 .env
            docker compose pull
            docker compose up -d --remove-orphans
          REMOTE

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/ec2_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" '
            cd /opt/facemaxx
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:8000/health; then
                exit 0
              fi
              sleep 2
            done

            echo "Deployment health check failed. Container status:"
            docker compose ps
            echo "Recent container logs:"
            docker compose logs --tail=120 api
            exit 1
          '
